upstream fastcgi_backend {
    server php:9000;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/pub;
    index index.php;
    autoindex off;
    charset UTF-8;
    client_max_body_size 100M;

    # Front controller
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # Static files with version support
    location /static/ {
        # Strip version number from URL
        location ~ ^/static/version\d+/ {
            rewrite ^/static/version\d+/(.*)$ /static/$1 last;
        }

        location ~* \.(ico|jpg|jpeg|png|gif|svg|js|css|swf|eot|ttf|otf|woff|woff2)$ {
            expires max;
            add_header Cache-Control "public";
            try_files $uri $uri/ /static.php?resource=$uri&$args;
        }

        try_files $uri $uri/ /static.php?resource=$uri&$args;
    }

    # Media files
    location /media/ {
        location ~* \.(ico|jpg|jpeg|png|gif|svg|swf|eot|ttf|otf|woff|woff2)$ {
            expires max;
            add_header Cache-Control "public";
            try_files $uri $uri/ /get.php$is_args$args;
        }
        try_files $uri $uri/ /get.php$is_args$args;
    }

    # Deny access to sensitive media
    location ~* ^/media/(downloadable|customer|import|theme_customization/.*\.xml) {
        deny all;
    }

    # Pub subfolders
    location /pub/ {
        alias /var/www/html/pub/;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    # PHP scripts
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass fastcgi_backend;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 600s;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param MAGE_RUN_TYPE store;
        fastcgi_param MAGE_RUN_CODE default;
    }

    # Caching for images, CSS, JS
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg)$ {
        expires 30d;
        access_log off;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}